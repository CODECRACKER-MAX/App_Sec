name: CI

on:
  workflow_dispatch:
  
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        
      # Install Semgrep
      - name: Install Semgrep
        run: pip install semgrep

      # Run Semgrep scan
      - name: Run Semgrep
        run: semgrep --config=auto . --sarif --output=semgrep.sarif

      # Save the semgrep report (FIXED: version changed to @v3, input changed to sarif_file)
      - name: Upload SARIF file to GitHub Security Tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
          
      # Install trivy
      - name: Trivy Installation & Scanning
        run: |
          sudo apt-get install wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install trivy
          
      # Run Trivy Scan via CLI (FIXED: Separated into its own clean workflow step)
      - name: Run Trivy Scan via CLI      
        run: trivy fs . --scanners vuln,misconfig,secret,license --format sarif --output trivy.sarif
                 
      # Trivy Scan Results Upload (FIXED: points to 'trivy.sarif' generated in the previous step)
      - name: Trivy Scan Results Upload to GitHub
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy.sarif'

      # Run ZAP using GitHub ACTIONS
      - name: Run OWASP ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.12.0
        with:
          target: 'http://127.0.0.1:3000'
          allow_issue_writing: false
          cmd_options: '-w zap-report.sarif'

      # Upload ZAP Alerts (FIXED: changed target file path from zap-report.sarif to the root folder context)
      - name: Upload ZAP Alerts to GitHub Security Tab
        uses: github/codeql-action/upload-sarif@v3
        if: always() 
        with:
          sarif_file: 'zap-report.sarif'
          
      - name: Nuclei Scanning....
        uses: projectdiscovery/nuclei-action@v3
        with:
          args: "-u http://127.0.0.1:3000 -format sarif -output nuclei-report.sarif"

      - name: Upload Nuclei Alerts to GitHub Security Tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'nuclei-report.sarif'
